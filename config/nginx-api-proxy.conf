# Nginx: proxy /api/ to Node.js (Pathwise backend on port 3000)
#
# On EC2, add this block INSIDE the existing server { } that has root /var/www/html;
# (e.g. in /etc/nginx/sites-available/default), BEFORE any "location /" block.
#
# Then run: sudo nginx -t && sudo systemctl reload nginx

location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
