<!--
Why:
  For the purpose of journaling, users can write reflection entries and have that connect
  with any of their goals and academic planning to highlight their progress

What:
  It defines the form for the reflection and list history of previous reflections.

Where used:
  It will be accessed as vertical-prototype/reflections.html.
  nav.js handles header implementation
  js/reflections.js. for the actual reflections implementation
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EJQBHDWYN8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EJQBHDWYN8');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflections - Pathwise</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages/goals.css" />
</head>
<body data-page="reflections">
  <header id="site-header">
    <div class="header-inner">
      <a href="landing.html" class="site-title">Pathwise</a>
      <nav id="main-nav">
        <a href="landing.html" class="nav-link">Home</a>
        <a href="index.html" class="nav-link">Browse</a>
        <a href="submit.html" class="nav-link">Submit Resource</a>
        <div id="nav-auth"></div>
      </nav>
    </div>
  </header>
  <main class="goals-main">
    <h1>Reflections</h1>
    <p class="profile-muted" style="margin-bottom:var(--space-lg)">Journal entries. Optionally link a goal or project ID.</p>
    <p id="refl-error" class="error" hidden></p>

    <section class="card" style="margin-bottom:var(--space-lg)">
      <h2 style="margin-top:0">New entry</h2>
      <form id="refl-form" class="goal-form-grid">
        <label>Entry <textarea id="refl-body" class="input" rows="4" required></textarea></label>
        <label>Goal ID (optional) <input type="number" id="refl-goal" class="input" min="1" placeholder="e.g. 1" /></label>
        <label>Project ID (optional) <input type="number" id="refl-project" class="input" min="1" /></label>
        <button type="submit" class="btn btn-primary">Save reflection</button>
      </form>
    </section>

    <h2>History</h2>
    <div id="refl-list" class="goal-list">Loading…</div>
  </main>
  <script src="nav.js"></script>
  <script src="js/reflections.js"></script>
</body>
</html>
