<!--
Why:
  We need simple page that allows a verified/authenticated users to share a resource to other 
  users on our platform, Pathwise, so we can create a network of information.

What:
  It outlines the acceptable form, status banner and what submit.js would use to upload 
  user input.

Where used:
  For it to work properly, submit.js will be called to call '/api/resources'
-->

<!DOCTYPE html>
<html lang="en" class="auth-gate-pending">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EJQBHDWYN8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-EJQBHDWYN8');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathwise - Submit Resource</title>
  <style>
    html.auth-gate-pending body {
      visibility: hidden;
    }
  </style>
  <script>
    (function () {
      fetch('/api/me', { credentials: 'include' })
        .then((response) => {
          if (!response.ok) {
            window.location.replace('/vertical-prototype/login.html');
            return;
          }
          document.documentElement.classList.remove('auth-gate-pending');
        })
        .catch(() => {
          window.location.replace('/vertical-prototype/login.html');
        });
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/submit.css">
</head>
<body data-page="submit">

  <header id="site-header">
    <div class="header-inner">
      <a href="landing.html" class="site-title">Pathwise</a>

      <nav id="main-nav">
        <a href="landing.html" class="nav-link">Home</a>
        <a href="index.html" class="nav-link">Browse</a>
        <a href="submit.html" class="nav-link">Submit Resource</a>
        <div id="nav-auth" data-auth-state="guest"></div>
      </nav>
    </div>
  </header>

  <main id="submit-main">
    <div class="submit-inner">
      <section class="submit-card">
        <!-- Update the page copy so it matches the new moderation flow from the backend. -->
        <h1 class="submit-title">Submit a resource for review</h1>
        <p class="submit-subtitle">Student submissions are saved to your account and sent to the moderation queue. Faculty, staff, or admins can approve them for public Browse later.</p>

        <div id="submit-error" class="submit-alert submit-alert--error" hidden></div>
        <div id="submit-success" class="submit-alert submit-alert--success" hidden></div>

        <form id="submitForm" class="submit-form" novalidate>
          <div class="submit-field">
            <label for="title">Title</label>
            <input type="text" id="title" class="input" required>
          </div>

          <div class="submit-field">
            <label for="url">URL</label>
            <input type="url" id="url" class="input" placeholder="https://example.com/resource">
          </div>

          <div class="submit-field">
            <label for="description">Description</label>
            <textarea id="description" class="input submit-textarea" required></textarea>
          </div>

          <div class="submit-grid">
            <div class="submit-field">
              <label for="category">Category</label>
              <select id="category" class="input" required>
                <option value="">Select a category</option>
                <option value="1">Academic</option>
                <option value="2">Career</option>
                <option value="3">Personal</option>
                <option value="4">Wellness</option>
              </select>
            </div>

            <div class="submit-field">
              <label for="cost">Cost</label>
              <select id="cost" class="input">
                <option value="">Select cost</option>
                <option value="free">Free</option>
                <option value="paid">Paid</option>
              </select>
            </div>
          </div>

          <div class="submit-field">
            <label for="image">Cover image (optional, max ~4MB)</label>
            <input type="file" id="image" name="image" accept="image/*" class="input" />
          </div>

          <fieldset class="submit-tags">
            <legend>Tags</legend>
            <div class="submit-tags-grid">
              <label class="checkbox-label"><input type="checkbox" value="resume"> Resume</label>
              <label class="checkbox-label"><input type="checkbox" value="internship"> Internship</label>
              <label class="checkbox-label"><input type="checkbox" value="study-skills"> Study Skills</label>
            </div>
          </fieldset>

          <button type="submit" id="submitButton" class="btn btn-primary submit-button">Submit Resource</button>
        </form>
      </section>
    </div>
  </main>

  <script src="nav.js"></script>
  <script src="submit.js"></script>
</body>
</html>
