<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathwise - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>

<body data-page="login">

    <header id="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-title">Pathwise</a>

            <nav id="main-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html" class="nav-link">Browse</a>
                <a href="submit.html" class="nav-link">Submit Resource</a>

                <div id="nav-auth" data-auth-state="guest">
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="register.html" class="nav-btn">Register</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Log in to save resources and track your progress.</p>

            <!-- Error message — shown by JS if login fails -->
            <div id="loginError" class="auth-error" role="alert"></div>

            <form id="loginForm" class="auth-form" novalidate>

                <div class="form-field">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="input"
                        placeholder="you@sfsu.edu"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-field">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="auth-submit">Log In</button>

            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Register</a>
            </p>
        </div>
    </main>

    <script src="nav.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const errorBox = document.getElementById('loginError');

        // Helper to show/hide the error banner
        function showError(message) {
            errorBox.textContent = message;
            errorBox.classList.add('is-visible');
        }

        function clearError() {
            errorBox.textContent = '';
            errorBox.classList.remove('is-visible');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Basic client-side check before hitting the server
            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }

            try {
                // TODO (F2): backend B1 still needs to provide POST /api/login.
                // This request is wired now so frontend can be tested as soon as the route lands.
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    showError(data.error || 'Invalid email or password.');
                    return;
                }

                // Login worked — go back to home
                window.location.href = 'index.html';

            } catch (err) {
                showError('Something went wrong. Please try again.');
            }
        });
    </script>

</body>
</html>
