<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathwise - Vertical Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header id="site-header">
        <div class="header-inner">
            <h1 class="site-title">Pathwise</h1>
            <p class="site-subtitle">CSC 648-848 · Section 02 · Spring 2026 · Team 2</p>
        </div>
    </header>

    <main id="main-content">

        <!-- Search and Filters -->
<section id="search-section">

    <form id="searchForm">
        <div class="form-group">
            <label for="searchInput">Search:</label>
            <input type="text" id="searchInput" name="q" placeholder="e.g., internship, study tips..." autocomplete="off">
        </div>
        <div class="form-group">
            <label for="category">Category:</label>
            <select id="category" name="category">
                <option value="">All Categories</option>
                <option value="1">Academic</option>
                <option value="2">Career</option>
                <option value="3">Personal</option>
                <option value="4">Wellness</option>
            </select>
        </div>
        <div class="form-group">
            <button type="submit" id="searchBtn">Search</button>
        </div>
    </form>

    <h2>Filters</h2>

    <div class="filter-group">
        <span class="filter-label">Tag</span>
        <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" /> Resume</label>
            <label class="checkbox-label"><input type="checkbox" /> Internship</label>
            <label class="checkbox-label"><input type="checkbox" /> Study Skills</label>
        </div>
    </div>

    <div class="filter-group">
        <span class="filter-label">Cost</span>
        <select class="cost-select">
            <option value="">All</option>
            <option value="free">Free</option>
            <option value="paid">Paid</option>
        </select>
    </div>

    <button type="button" class="btn-apply-filters">Apply Filters</button>
    <button type="button" class="btn-clear-filters">Clear</button>

    <div class="guest-note">
        <p class="guest-note-title">Guest Note</p>
        <p>Guests can browse. Saving prompts sign-in.</p>
    </div>

</section>

        <!-- Results populated by app.js via GET /api/search?q=...&category=... -->
        <section id="results-section">
            <h2>Results</h2>
            <div id="results">
                <p>Waiting for input...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
