<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathwise - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages/search.css">
</head>

<body data-page="home">

    <header id="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-title">Pathwise</a>

            <!-- Main navigation -->
            <nav id="main-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="index.html" class="nav-link">Browse</a>
                <a href="submit.html" class="nav-link">Submit Resource</a>

                <!-- Auth links stay static until F4 can use backend B8: GET /api/me -->
                <div id="nav-auth" data-auth-state="guest">
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="register.html" class="nav-btn">Register</a>
                </div>
            </nav>
        </div>
    </header>

    <main id="main-content">

        <!-- Search and Filters -->
        <section id="search-section">

            <form id="searchForm">
                <div class="form-group">
                    <label for="searchInput">Search:</label>
                    <input type="text" id="searchInput" name="q" placeholder="e.g., internship, study tips..." autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="category">Category:</label>
                    <select id="category" name="category">
                        <option value="">All Categories</option>
                        <option value="1">Academic</option>
                        <option value="2">Career</option>
                        <option value="3">Personal</option>
                        <option value="4">Wellness</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" id="searchBtn">Search</button>
                </div>
            </form>

            <h2>Filters</h2>

            <div class="filter-group">
                <span class="filter-label">Tag</span>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" value="resume" data-tag="resume" /> Resume</label>
                    <label class="checkbox-label"><input type="checkbox" value="internship" data-tag="internship" /> Internship</label>
                    <label class="checkbox-label"><input type="checkbox" value="study-skills" data-tag="study-skills" /> Study Skills</label>
                </div>
            </div>

            <div class="filter-group">
                <span class="filter-label">Cost</span>
                <select class="cost-select" id="cost-filter">
                    <option value="">All</option>
                    <option value="free">Free</option>
                    <option value="paid">Paid</option>
                </select>
            </div>

            <button type="button" class="btn-apply-filters">Apply Filters</button>
            <button type="button" class="btn-clear-filters">Clear</button>

            <div class="guest-note">
                <p class="guest-note-title">Guest Note</p>
                <p>Guests can browse. Saving prompts sign-in.</p>
            </div>

        </section>

        <!-- Results populated by app.js via GET /api/search?q=...&category=... -->
        <section id="results-section">
            <h2>Results</h2>
            <div id="results">
                <p>Waiting for input...</p>
            </div>
        </section>

    </main>

    <script src="nav.js"></script>
    <script src="app.js"></script>
</body>
</html>
