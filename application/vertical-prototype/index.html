<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathwise - Vertical Prototype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header id="site-header">
        <div class="header-inner">
            <h1 class="site-title">Pathwise</h1>
            <p class="site-subtitle">CSC 648-848 · Section 02 · Spring 2026 · Team 2</p>
        </div>
    </header>

    <main id="main-content">
        <section id="search-section">
            <form id="searchForm">

                <div class="form-group">
                    <label for="searchInput">Search:</label>
                    <input type="text" id="searchInput" name="q" placeholder="e.g., internship, study tips..." autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="category">Category:</label>
                    <select id="category" name="category">
                        <option value="">All Categories</option>
                        <option value="1">Academic</option>
                        <option value="2">Career</option>
                        <option value="3">Personal</option>
                        <option value="4">Wellness</option>
                    </select>
                </div>

                <div class="form-group">
                    <button type="submit" id="searchBtn">Search</button>
                </div>

            </form>
        </section>

        <!-- Results populated by app.js via GET /api/search?q=...&category=... -->
        <section id="results-section">
            <h2>Results</h2>
            <div id="results">
                <p>Waiting for input...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
