<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages - Pathwise</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/pages/goals.css" />
</head>
<body data-page="messages">
  <header id="site-header">
    <div class="header-inner">
      <a href="landing.html" class="site-title">Pathwise</a>
      <nav id="main-nav">
        <a href="landing.html" class="nav-link">Home</a>
        <a href="index.html" class="nav-link">Browse</a>
        <a href="submit.html" class="nav-link">Submit Resource</a>
        <div id="nav-auth"></div>
      </nav>
    </div>
  </header>
  <main class="goal-detail-main">
    <h1>Messages</h1>
    <p id="msg-error" class="error" hidden></p>
    <div class="msg-layout" style="display:grid;grid-template-columns:1fr 1.2fr;gap:var(--space-lg);align-items:start">
      <section class="card">
        <h2 style="margin-top:0">Inbox</h2>
        <div id="inbox-list">Loading…</div>
      </section>
      <section class="card">
        <h2 style="margin-top:0">Compose / thread</h2>
        <label>Find user <input type="search" id="user-search" class="input" placeholder="Search username (min 2 chars)" /></label>
        <div id="user-suggest" style="margin:8px 0"></div>
        <input type="hidden" id="to-user-id" />
        <p class="profile-muted" id="to-user-label"></p>
        <label>Message <textarea id="msg-body" class="input" rows="3"></textarea></label>
        <button type="button" class="btn btn-primary" id="send-btn">Send</button>
        <h3 style="margin-top:var(--space-lg)">Thread</h3>
        <div id="thread-view" class="thread-view">Select a user or open an inbox message.</div>
      </section>
    </div>
  </main>
  <script src="nav.js"></script>
  <script src="js/messages.js"></script>
</body>
</html>
