<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Production API base URL; override for local dev if needed. -->
    <meta name="pathwise-api-origin" content="http://3.135.184.72">
    <title>Pathwise - Forgot password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>

<body data-page="forgot-password">

    <header id="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-title">Pathwise</a>

            <nav id="main-nav">
                <a href="landing.html" class="nav-link">Home</a>
                <a href="index.html" class="nav-link">Browse</a>
                <a href="submit.html" class="nav-link">Submit Resource</a>

                <div id="nav-auth" data-auth-state="guest"></div>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card auth-card-wide">
            <h1 class="auth-title">Reset your password</h1>
            <p class="auth-subtitle" id="pageSubtitle">Enter your email, any numeric verification code, and your new password.</p>

            <p class="auth-demo-notice" role="note">
                <strong>Demo only:</strong> Any numeric verification code is accepted in this build.
            </p>

            <div id="forgotError" class="auth-error" role="alert"></div>
            <div id="forgotSuccess" class="auth-success" role="status" hidden></div>

            <section class="auth-reset-section" aria-labelledby="step-reset-heading">
                <h2 id="step-reset-heading" class="auth-section-heading">Reset details</h2>

                <form id="resetForm" class="auth-form" novalidate>
                    <div class="form-field">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="input"
                            placeholder="you@sfsu.edu"
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-field">
                        <label for="resetCode">Verification code</label>
                        <input
                            type="text"
                            id="resetCode"
                            name="resetCode"
                            class="input input-code"
                            inputmode="numeric"
                            autocomplete="one-time-code"
                            maxlength="16"
                            placeholder="Any number"
                            aria-describedby="codeHintShort"
                        >
                        <span id="codeHintShort" class="field-hint">Enter any numeric code.</span>
                    </div>

                    <div class="form-field">
                        <label for="password">New password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="input"
                            placeholder="At least 8 characters"
                            required
                            minlength="8"
                            autocomplete="new-password"
                        >
                    </div>

                    <div class="form-field">
                        <label for="password2">Confirm password</label>
                        <input
                            type="password"
                            id="password2"
                            name="password2"
                            class="input"
                            placeholder="Repeat password"
                            required
                            minlength="8"
                            autocomplete="new-password"
                        >
                    </div>

                    <button type="submit" class="auth-submit" id="submitBtn">Set new password</button>
                </form>
            </section>

            <p class="auth-footer" id="footerLinks">
                <a href="login.html">Back to login</a>
            </p>
        </div>
    </main>

    <script src="nav.js"></script>
    <script>
        const resetForm = document.getElementById('resetForm');
        const errorBox = document.getElementById('forgotError');
        const successBox = document.getElementById('forgotSuccess');
        const resetCodeInput = document.getElementById('resetCode');
        const submitBtn = document.getElementById('submitBtn');
        const pageSubtitle = document.getElementById('pageSubtitle');

        function apiOrigin() {
            const meta = document.querySelector('meta[name="pathwise-api-origin"]');
            if (meta && meta.content.trim()) return meta.content.trim().replace(/\/$/, '');
            if (window.location.protocol === 'file:') return 'http://127.0.0.1:3000';
            const port = window.location.port;
            const host = window.location.hostname;
            if (port && port !== '3000') {
                // If the page is served from a frontend dev server (e.g. :5500), prefer API on :3000.
                return `${window.location.protocol}//${host || '127.0.0.1'}:3000`;
            }
            return '';
        }

        function apiUrl(path) {
            const base = apiOrigin();
            return base ? base + path : path;
        }

        async function apiPost(path, body) {
            const url = apiUrl(path);
            let response;
            try {
                response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(body)
                });
            } catch {
                return {
                    response: null,
                    data: {},
                    networkError: true
                };
            }
            const text = await response.text();
            let data = {};
            const trimmed = text.trim();
            if (trimmed) {
                try {
                    data = JSON.parse(trimmed);
                } catch {
                    data = {
                        success: false,
                        _nonJson: true,
                        _status: response.status
                    };
                }
            }
            return { response, data, networkError: false };
        }

        const apiHint =
            'Open this page through the deployed site (http://3.135.184.72/vertical-prototype/forgot-password.html). For local development, change the pathwise-api-origin meta tag at the top of this file to your API base URL (e.g. http://127.0.0.1:3000).';

        function showError(message) {
            successBox.hidden = true;
            successBox.textContent = '';
            errorBox.textContent = message;
            errorBox.classList.add('is-visible');
        }

        function clearError() {
            errorBox.textContent = '';
            errorBox.classList.remove('is-visible');
        }

        function showBannerSuccess(message) {
            clearError();
            successBox.textContent = message;
            successBox.hidden = false;
        }

        function normalizeNumericCode(raw) {
            return String(raw == null ? '' : raw).replace(/\D/g, '');
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();

            const code = normalizeNumericCode(resetCodeInput.value);
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            if (!email) {
                showError('Please enter your email.');
                return;
            }
            if (!code) {
                showError('Enter any numeric verification code.');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }
            if (password !== password2) {
                showError('Passwords do not match.');
                return;
            }

            submitBtn.disabled = true;
            try {
                const { response, data, networkError } = await apiPost('/api/password-reset/confirm', { email, code, password });

                if (networkError) {
                    showError('Cannot reach the Pathwise server. ' + apiHint);
                    return;
                }

                if (data._nonJson || !response) {
                    showError(
                        'The server did not return JSON' +
                        (data._status ? ` (HTTP ${data._status})` : '') +
                        '. ' +
                        apiHint
                    );
                    return;
                }

                if (!response.ok || data.success === false) {
                    showError(data.error || 'Could not reset password.');
                    return;
                }

                resetForm.closest('section').hidden = true;
                pageSubtitle.hidden = true;
                document.querySelector('.auth-demo-notice').hidden = true;
                successBox.hidden = false;
                successBox.textContent = data.message || 'Password updated.';
                document.getElementById('footerLinks').innerHTML =
                    '<a href="login.html">Log in</a>';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
