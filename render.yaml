# Render Blueprint — optional. You can also create the Web Service manually in the dashboard.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pathwise
    runtime: node
    rootDir: application
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: true
      - key: DB_SSL
        value: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: pathwise
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
